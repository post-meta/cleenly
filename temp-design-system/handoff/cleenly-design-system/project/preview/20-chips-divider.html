<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:28px 32px;">
  <div class="card-label" style="margin-bottom:14px;">Chips, badges & hairline divider</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span style="background:rgba(245,239,230,.6);border:1px solid rgba(221,213,199,.6);color:var(--color-foreground);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--radius-md);">Eco-friendly</span>
    <span style="background:rgba(245,239,230,.6);border:1px solid rgba(221,213,199,.6);color:var(--color-foreground);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--radius-md);">Pet-safe</span>
    <span style="background:rgba(245,239,230,.6);border:1px solid rgba(221,213,199,.6);color:var(--color-foreground);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--radius-md);">Same-day available</span>
    <span style="background:#DCE5DF;color:#2D4A3E;font-size:11px;font-weight:600;padding:5px 11px;border-radius:9999px;letter-spacing:0.04em;text-transform:uppercase;">Recommended</span>
    <span style="background:#F4DDD0;color:#A8462E;font-size:11px;font-weight:600;padding:5px 11px;border-radius:9999px;letter-spacing:0.04em;text-transform:uppercase;">Limited</span>
  </div>
  <div style="margin-top:20px;display:flex;align-items:center;gap:12px;">
    <span style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-foreground-muted);">Trust</span>
    <div style="flex:1;height:1px;background:var(--color-border);opacity:0.6;"></div>
  </div>
  <div style="margin-top:12px;font-size:14px;color:var(--color-foreground-soft);">Licensed &nbsp;·&nbsp; Insured &nbsp;·&nbsp; Bonded &nbsp;·&nbsp; Background-checked</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 32px;background:var(--color-background);">
  <div class="card-label" style="margin-bottom:14px;">Modal · desktop centered · mobile bottom sheet · warm overlay</div>
  <div style="display:grid;grid-template-columns:1fr 0.7fr;gap:16px;align-items:start;">
    <!-- desktop centered -->
    <div style="position:relative;height:280px;border-radius:var(--radius-lg);overflow:hidden;background:linear-gradient(rgba(45,40,38,0.5),rgba(45,40,38,0.5)),repeating-linear-gradient(45deg,#E8E0D2 0 16px,#DDD5C7 16px 32px);">
      <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:280px;background:var(--color-background);border-radius:var(--radius-xl);padding:20px;box-shadow:var(--shadow-lift);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <span style="font-family:var(--font-display);font-weight:400;font-size:22px;line-height:1.1;letter-spacing:-0.02em;">Cancel this <em style="font-style:italic;color:var(--color-foreground-soft);">booking?</em></span>
          <button style="background:none;border:none;cursor:pointer;padding:0;color:var(--color-foreground-muted);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg></button>
        </div>
        <p style="font-size:13px;color:var(--color-foreground-soft);line-height:1.55;">Cancelling within 24 hrs of your scheduled cleaning will incur a $25 fee.</p>
        <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end;">
          <button style="background:transparent;border:1px solid var(--color-border);color:var(--color-foreground);height:38px;padding:0 16px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;">Keep booking</button>
          <button style="background:var(--color-accent);color:#fff;border:none;height:38px;padding:0 16px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;">Cancel anyway</button>
        </div>
      </div>
      <span style="position:absolute;bottom:8px;left:12px;font-family:monospace;font-size:10px;color:#FAFAF8;">desktop · rounded-xl 24 · max-w-480</span>
    </div>
    <!-- mobile bottom sheet -->
    <div style="position:relative;height:280px;border-radius:var(--radius-lg);overflow:hidden;background:linear-gradient(rgba(45,40,38,0.5),rgba(45,40,38,0.5)),repeating-linear-gradient(45deg,#E8E0D2 0 16px,#DDD5C7 16px 32px);">
      <div style="position:absolute;left:0;right:0;bottom:0;background:var(--color-background);border-radius:32px 32px 0 0;padding:14px 18px 22px;box-shadow:0 -8px 32px rgba(45,40,38,0.18);">
        <div style="width:36px;height:4px;border-radius:9999px;background:var(--color-mushroom);margin:0 auto 12px;"></div>
        <div style="font-family:var(--font-display);font-weight:400;font-size:20px;line-height:1.15;letter-spacing:-0.02em;">Cancel this <em style="font-style:italic;color:var(--color-foreground-soft);">booking?</em></div>
        <p style="font-size:12px;color:var(--color-foreground-soft);margin-top:6px;line-height:1.55;">$25 fee within 24 hrs.</p>
        <button style="width:100%;margin-top:12px;background:var(--color-accent);color:#fff;border:none;height:44px;font-size:14px;font-weight:500;border-radius:10px;cursor:pointer;">Cancel anyway</button>
      </div>
      <span style="position:absolute;bottom:8px;left:12px;font-family:monospace;font-size:10px;color:#FAFAF8;">mobile · rounded-t-2xl 32 · max-h 85vh</span>
    </div>
  </div>
</body></html>

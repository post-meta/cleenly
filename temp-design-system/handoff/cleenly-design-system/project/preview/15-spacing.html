<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div class="card-label" style="margin-bottom:14px;">Section spacing · vertical rhythm tokens</div>
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px 14px;align-items:center;">
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-xs</span>
      <div style="height:10.909090909090908px;width:24px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">24px</span>
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-sm</span>
      <div style="height:21.818181818181817px;width:48px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">48px</span>
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-md</span>
      <div style="height:32.72727272727273px;width:72px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">72px</span>
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-lg</span>
      <div style="height:43.63636363636363px;width:96px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">96px</span>
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-xl</span>
      <div style="height:54.54545454545454px;width:120px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">120px</span>
    
      <span style="font-family:monospace;font-size:12px;color:var(--color-foreground-muted);">--spacing-2xl</span>
      <div style="height:72.72727272727272px;width:160px;background:var(--color-accent-soft);border-left:2px solid var(--color-accent);"></div>
      <span style="font-family:monospace;font-size:12px;">160px</span>
    
  </div>
</body></html>

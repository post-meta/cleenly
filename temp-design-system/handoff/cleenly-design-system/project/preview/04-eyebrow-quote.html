<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:36px 40px;">
  <div style="display:flex;flex-direction:column;gap:18px;">
    <div>
      <div class="card-label" style="margin-bottom:8px;">Eyebrow · 13 / 500 / tracking 0.08em / uppercase</div>
      <div style="display:flex;gap:24px;align-items:center;">
        <span style="font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-foreground-muted);">Our service areas</span>
        <span style="font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-signal);">PNW stewardship</span>
        <span style="font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-accent);">Recommended</span>
      </div>
    </div>
    <div style="height:1px;background:var(--color-border);opacity:0.6;"></div>
    <div>
      <div class="card-label" style="margin-bottom:10px;">Editorial pull quote · Instrument Serif italic 28-36px</div>
      <blockquote style="font-family:var(--font-display);font-weight:400;font-style:italic;font-size:30px;line-height:1.3;color:var(--color-foreground-soft);max-width:560px;">
        "The same crew. The same care. Like a key under the mat — but better."
      </blockquote>
    </div>
  </div>
</body></html>

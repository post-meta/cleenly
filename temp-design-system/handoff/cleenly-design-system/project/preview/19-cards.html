<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div class="card-label" style="margin-bottom:14px;">Cards · canonical resting & selected</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div style="border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-background);padding:18px 20px;">
      <div style="font-size:13px;color:var(--color-foreground-muted);">Regular Cleaning</div>
      <div style="font-family:var(--font-display);font-weight:400;font-size:32px;letter-spacing:-0.02em;margin-top:6px;" class="tnum">$140 – $180</div>
      <div style="font-size:13px;color:var(--color-foreground-muted);margin-top:4px;">Typical duration: 2.5 – 3 hrs</div>
    </div>
    <div style="border:2px solid var(--color-foreground);border-radius:var(--radius-xl);background:#F5EFE6;padding:18px 20px;position:relative;">
      <div style="font-size:15px;font-weight:600;">Deep Cleaning</div>
      <div style="font-size:13px;color:var(--color-foreground-soft);margin-top:4px;line-height:1.5;">Inside appliances, baseboards, detailed work.</div>
      <div style="position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:9999px;background:var(--color-foreground);display:flex;align-items:center;justify-content:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#FAFAF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <div class="card-mono" style="position:absolute;bottom:8px;right:14px;color:var(--color-foreground-muted);">selected</div>
    </div>
  </div>
  <div style="margin-top:14px;border:2px solid var(--color-signal);background:rgba(220,229,223,.25);border-radius:var(--radius-xl);padding:16px 18px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:600;">Damp-Season Reset</span>
      <span style="background:#DCE5DF;color:#2D4A3E;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;letter-spacing:0.04em;text-transform:uppercase;">PNW Stewardship</span>
    </div>
    <div style="font-size:12px;color:var(--color-foreground-soft);">Mildew prevention, vent re-set, deep mop with cedar-pine wash. <span style="color:var(--color-signal);font-weight:600;float:right;">+$45</span></div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 32px;">
  <div class="card-label" style="margin-bottom:14px;">Form fields · h-44 · radius-md · hairline border</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Service address</label>
      <input value="2104 Eastlake Ave E, Seattle" style="width:100%;height:44px;padding:0 14px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:15px;color:var(--color-foreground);background:var(--color-background);"/>
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Bedrooms</label>
      <div style="position:relative;">
        <select style="appearance:none;width:100%;height:44px;padding:0 36px 0 14px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:15px;color:var(--color-foreground);background:var(--color-background);">
          <option>2 Bedrooms</option>
        </select>
        <svg style="position:absolute;right:12px;top:50%;transform:translateY(-50%);" width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="#8C8073" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8l4 4 4-4"/></svg>
      </div>
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Email · focused</label>
      <input value="you@example.com" style="width:100%;height:44px;padding:0 14px;border:1px solid var(--color-foreground);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:15px;color:var(--color-foreground);background:var(--color-background);box-shadow:0 0 0 3px var(--color-accent-soft);"/>
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Phone · error</label>
      <input value="(206) 555-" style="width:100%;height:44px;padding:0 14px;border:1px solid var(--color-error);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:15px;color:var(--color-foreground);background:var(--color-background);"/>
      <div style="font-size:12px;color:var(--color-error);margin-top:4px;">Phone number is required</div>
    </div>
  </div>
</body></html>

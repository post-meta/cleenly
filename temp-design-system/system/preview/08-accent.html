<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div class="card-label" style="margin-bottom:14px;">Accent · terracotta · primary CTA, focus, selection</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div class="swatch"><div class="swatch__chip" style="background:#D97757;"></div><div class="swatch__meta"><span class="swatch__name">accent</span><span class="swatch__hex">#D97757</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">primary</span></div></div><div class="swatch"><div class="swatch__chip" style="background:#C26544;"></div><div class="swatch__meta"><span class="swatch__name">accent-hover</span><span class="swatch__hex">#C26544</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">hover / press</span></div></div><div class="swatch"><div class="swatch__chip" style="background:#F4DDD0;"></div><div class="swatch__meta"><span class="swatch__name">accent-soft</span><span class="swatch__hex">#F4DDD0</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">quiet bg / badge</span></div></div>
  </div>
  <div style="margin-top:16px;display:flex;gap:10px;align-items:center;">
    <button class="btn btn--md btn--primary">Confirm booking</button>
    <span style="background:#F4DDD0;color:#A8462E;border-radius:9999px;padding:5px 11px;font-size:12px;font-weight:600;">Limited slots</span>
  </div>
</body></html>

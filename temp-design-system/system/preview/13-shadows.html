<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:28px 32px 40px;">
  <div class="card-label" style="margin-bottom:18px;">Shadows · warm charcoal · never rgba(0,0,0,…)</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:100%;height:88px;background:#fff;border-radius:var(--radius-lg);box-shadow:0 1px 2px rgba(45,40,38,.04), 0 4px 12px rgba(45,40,38,.04);"></div>
      <div style="font-size:12px;font-weight:600;color:var(--color-foreground);">shadow-soft</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">passive lift</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:100%;height:88px;background:#fff;border-radius:var(--radius-lg);box-shadow:0 2px 4px rgba(45,40,38,.06), 0 8px 24px rgba(45,40,38,.06);"></div>
      <div style="font-size:12px;font-weight:600;color:var(--color-foreground);">shadow-card</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">resting cards</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:100%;height:88px;background:#fff;border-radius:var(--radius-lg);box-shadow:0 4px 8px rgba(45,40,38,.08), 0 16px 40px rgba(45,40,38,.08);"></div>
      <div style="font-size:12px;font-weight:600;color:var(--color-foreground);">shadow-lift</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">sticky / active</div>
    </div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div class="card-label" style="margin-bottom:14px;">Foreground · warm charcoal tiers (never #000)</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div class="swatch"><div class="swatch__chip" style="background:#2D2826;"></div><div class="swatch__meta"><span class="swatch__name">foreground</span><span class="swatch__hex">#2D2826</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">primary</span></div></div><div class="swatch"><div class="swatch__chip" style="background:#4A4540;"></div><div class="swatch__meta"><span class="swatch__name">foreground-soft</span><span class="swatch__hex">#4A4540</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">secondary</span></div></div><div class="swatch"><div class="swatch__chip" style="background:#8C8073;"></div><div class="swatch__meta"><span class="swatch__name">foreground-muted</span><span class="swatch__hex">#8C8073</span><span class="swatch__hex" style="color:var(--color-foreground-muted);">caption / hint</span></div></div>
  </div>
  <div style="margin-top:18px;padding:14px 16px;background:var(--color-surface-warm);border-radius:var(--radius-md);">
    <div style="color:#2D2826;font-size:15px;font-weight:600;">Primary on warm paper</div>
    <div style="color:#4A4540;font-size:14px;margin-top:2px;">Soft for supporting copy and longer paragraphs.</div>
    <div style="color:#8C8073;font-size:13px;margin-top:2px;">Muted for captions, helper text, and metadata.</div>
  </div>
</body></html>

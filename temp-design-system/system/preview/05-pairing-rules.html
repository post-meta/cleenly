<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:32px 40px;">
  <div class="card-label" style="margin-bottom:18px;">Type pairing rules</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div style="border:1px solid var(--color-signal-soft);background:#fff;border-radius:var(--radius-lg);padding:16px 18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="width:18px;height:18px;border-radius:9999px;background:var(--color-signal);display:inline-flex;align-items:center;justify-content:center;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
        </span>
        <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-signal);">Do</span>
      </div>
      <div style="font-family:var(--font-display);font-weight:400;font-size:34px;line-height:1.1;letter-spacing:-0.02em;color:var(--color-foreground);">
        Our service <em style="font-style:italic;color:var(--color-foreground-soft);">areas.</em>
      </div>
      <div class="card-mono" style="margin-top:10px;">weight: 400 &middot; em on noun</div>
    </div>
    <div style="border:1px solid #E6CDC7;background:#fff;border-radius:var(--radius-lg);padding:16px 18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="width:18px;height:18px;border-radius:9999px;background:var(--color-error);display:inline-flex;align-items:center;justify-content:center;">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
        </span>
        <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-error);">Don't</span>
      </div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:34px;line-height:1.1;letter-spacing:-0.02em;color:var(--color-foreground);">
        Our Service Areas
      </div>
      <div class="card-mono" style="margin-top:10px;">never bold serif &middot; never title-case</div>
    </div>
  </div>
</body></html>

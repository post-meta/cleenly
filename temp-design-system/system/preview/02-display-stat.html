<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:36px 40px;">
  <div class="card-label" style="margin-bottom:14px;">Editorial stat · tabular numerals</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:end;">
    <div>
      <div class="tnum" style="font-family:var(--font-display);font-weight:400;font-size:72px;line-height:0.95;letter-spacing:-0.02em;color:var(--color-foreground);">2,400</div>
      <div style="font-size:13px;color:var(--color-foreground-muted);margin-top:8px;">homes cleaned</div>
    </div>
    <div>
      <div class="tnum" style="font-family:var(--font-display);font-weight:400;font-size:72px;line-height:0.95;letter-spacing:-0.02em;color:var(--color-signal);">4.92</div>
      <div style="font-size:13px;color:var(--color-foreground-muted);margin-top:8px;">average rating</div>
    </div>
    <div>
      <div class="tnum" style="font-family:var(--font-display);font-weight:400;font-size:72px;line-height:0.95;letter-spacing:-0.02em;color:var(--color-foreground);">98%</div>
      <div style="font-size:13px;color:var(--color-foreground-muted);margin-top:8px;">return customers</div>
    </div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;">
  <div class="card-label" style="margin-bottom:18px;">Radii · xs 4 / sm 6 / md 10 / lg 16 / xl 24 / 2xl 32 / full</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:end;">
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:4px;"></div>
      <div style="font-size:11px;font-weight:600;">xs</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">4px</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:6px;"></div>
      <div style="font-size:11px;font-weight:600;">sm</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">6px · inputs</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:10px;"></div>
      <div style="font-size:11px;font-weight:600;">md</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">10px · buttons</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:16px;"></div>
      <div style="font-size:11px;font-weight:600;">lg</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">16px · cards</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:24px;"></div>
      <div style="font-size:11px;font-weight:600;">xl</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">24px · steps</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:32px;"></div>
      <div style="font-size:11px;font-weight:600;">2xl</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">32px · hero</div>
    </div><div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:64px;height:64px;background:var(--color-surface-warm);border:1px solid var(--color-border);border-radius:9999px;"></div>
      <div style="font-size:11px;font-weight:600;">full</div>
      <div style="font-family:monospace;font-size:10px;color:var(--color-foreground-muted);text-align:center;">pills, avatars</div>
    </div>
  </div>
</body></html>

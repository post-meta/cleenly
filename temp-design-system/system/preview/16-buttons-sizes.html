<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:28px 32px;">
  <div class="card-label" style="margin-bottom:14px;">Buttons · sm h-36 / md h-44 / lg h-56</div>
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn--sm btn--primary">Continue</button>
    <button class="btn btn--md btn--primary">See my price</button>
    <button class="btn btn--lg btn--primary">Confirm booking</button>
  </div>
  <div style="height:1px;background:var(--color-border);opacity:0.6;margin:18px 0;"></div>
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn--md btn--secondary">Back</button>
    <button class="btn btn--md btn--ghost">Skip for now</button>
    <button class="btn btn--link">Not sure which to choose?</button>
  </div>
</body></html>
